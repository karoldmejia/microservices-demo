name: Infrastructure Pipeline

on:
  pull_request:
    paths:
      - 'infrastructure/**'
      - 'scripts/infra/**'
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Give execute permissions to scripts
        run: |
          chmod +x scripts/infra/*.sh
          chmod +x scripts/dev/*.sh
      
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      
      - name: Install helm-diff
        run: helm plugin install https://github.com/databus23/helm-diff || true
      
      - name: Install kube-score
        run: |
          curl -L https://github.com/zegl/kube-score/releases/download/v1.17.0/kube-score_1.17.0_linux_amd64 -o kube-score
          chmod +x kube-score
          sudo mv kube-score /usr/local/bin/
          kube-score version
      
      - name: Install checkov
        run: |
          pip install checkov
          checkov --version
      
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.49.0
          trivy --version
      
      - name: Validate Helm chart
        run: ./scripts/infra/validate-chart.sh
      
      - name: Dry-run upgrade
        run: ./scripts/infra/dry-run-upgrade.sh
      
      - name: Security scan with Trivy
        run: |
          trivy config ./infrastructure --severity HIGH,CRITICAL --exit-code 0

  gitops-sync:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Give execute permissions
        run: chmod +x scripts/infra/*.sh
      
      - name: Install yq
        run: |
          sudo snap install yq
      
      - name: Update ArgoCD manifests
        run: |
          # git clone https://github.com/your-org/gitops-config
          # cd gitops-config
          # yq eval '.spec.source.targetRevision = "'$GITHUB_SHA'"' -i environments/production/infrastructure.yaml
          # git add .
          # git commit -m "Update infrastructure to $GITHUB_SHA" || echo "No changes"
          # git push || echo "Push failed"