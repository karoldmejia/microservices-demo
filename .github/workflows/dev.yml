name: Development Pipeline

on:
  pull_request:
    branches: [develop]
  push:
    branches: [feature/*, bugfix/*]

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  MONOREPO: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
      
      - name: Run linters
        run: ./scripts/dev/lint.sh
      
      - name: Unit tests - Vote (Java)
        run: cd vote && mvn test
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download Go dependencies
        run: |
          cd worker
          go mod download

      - name: Unit tests - Worker (Go)
        run: |
          cd worker
          go test -v ./...
            
      - name: Unit tests - Result (Node.js)
        run: echo "No tests defined for result service yet"

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL

      - name: Scan Vote
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ./vote

      - name: Scan Worker
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ./worker

      - name: Scan Result
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ./result

  deploy:
      needs: [lint-and-test, security-scan]
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - name: Install kubectl
          uses: azure/setup-kubectl@v4

        - name: Install Helm
          uses: azure/setup-helm@v4

        - name: Create Kind Cluster
          uses: helm/kind-action@v1

        - name: Deploy infrastructure (Kafka + Postgres)
          run: |
            kubectl create namespace infrastructure
            helm upgrade --install infrastructure ./infrastructure \
              --namespace infrastructure \
              --set postgresql.persistence.enabled=false \
              --set kafka.persistence.enabled=false

        - name: Build Docker images
          run: |
            docker build -t vote:dev ./vote
            docker build -t worker:dev ./worker
            docker build -t result:dev ./result

        - name: Load images into Kind
          run: |
            kind load docker-image vote:dev
            kind load docker-image worker:dev
            kind load docker-image result:dev

        - name: Deploy services
          run: |
            kubectl apply -f k8s/vote.yaml
            kubectl apply -f k8s/worker.yaml
            kubectl apply -f k8s/result.yaml

        - name: Integration tests
          run: ./scripts/dev/integration-test.sh
