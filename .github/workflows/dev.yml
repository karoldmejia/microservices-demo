name: Development Pipeline

on:
  pull_request:
    branches: [develop]
  push:
    branches: [feature/*, bugfix/*]

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  MONOREPO: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
      
      - name: Run linters
        run: ./scripts/dev/lint.sh
      
      - name: Unit tests - Vote (Java)
        run: cd vote && mvn test
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download Go dependencies
        run: |
          cd worker
          go mod download

      - name: Unit tests - Worker (Go)
        run: |
          cd worker
          go test -v ./...
            
      - name: Unit tests - Result (Node.js)
        run: echo "No tests defined for result service yet"

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL

      - name: Scan Vote
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ./vote

      - name: Scan Worker
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ./worker

      - name: Scan Result
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ./result

  build-and-deploy-dev:
    needs: [lint-and-test, security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Okteto
        uses: okteto/setup-okteto@latest

      - name: Okteto Login
        run: okteto context use
        env:
          OKTETO_TOKEN: ${{ secrets.OKTETO_TOKEN }}

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io/${{ github.repository_owner }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push images
        run: |
          docker build -t $REGISTRY/vote:dev-$GITHUB_SHA ./vote
          docker push $REGISTRY/vote:dev-$GITHUB_SHA
          
          docker build -t $REGISTRY/worker:dev-$GITHUB_SHA ./worker
          docker push $REGISTRY/worker:dev-$GITHUB_SHA
          
          docker build -t $REGISTRY/result:dev-$GITHUB_SHA ./result
          docker push $REGISTRY/result:dev-$GITHUB_SHA
      
      - name: Deploy to Okteto Dev Environment
        run: |
          bash ./scripts/dev/deploy-dev.sh vote
          bash ./scripts/dev/deploy-dev.sh worker
          bash ./scripts/dev/deploy-dev.sh result
      
      - name: Run integration tests
        run: ./scripts/dev/integration-test.sh